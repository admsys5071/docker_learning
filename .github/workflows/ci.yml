name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ============================================
  # JOB 1 : Build, démarrage et tests
  # ============================================
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Créer les fichiers de secrets
        run: |
          mkdir -p secrets
          echo "${{ secrets.POSTGRES_USER }}" > secrets/postgres_user
          echo "${{ secrets.POSTGRES_PASSWORD }}" > secrets/postgres_password
          echo "${{ secrets.POSTGRES_DB }}" > secrets/postgres_db

      - name: Build des images Docker
        run: docker compose build

      - name: Démarrer les conteneurs
        run: docker compose up -d

      - name: Attendre le démarrage des services
        run: sleep 15

      - name: Tests de santé
        run: |
          echo "=== Test API ==="
          curl -f http://localhost:8080 || exit 1
          echo ""
          echo "=== Test Grafana ==="
          curl -f http://localhost:3001/api/health || exit 1
          echo ""
          echo "=== Test Prometheus ==="
          curl -f http://localhost:9090/-/healthy || exit 1
          echo ""
          echo "Tous les services sont opérationnels !"

      - name: Logs des conteneurs (debug)
        if: failure()
        run: docker compose logs

      - name: Arrêter les conteneurs
        if: always()
        run: docker compose down -v

  # ============================================
  # JOB 2 : Push vers Docker Hub
  # ============================================
  push-to-dockerhub:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build et tag de l'image API
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/docker-learning-api:latest \
                        -t ${{ secrets.DOCKERHUB_USERNAME }}/docker-learning-api:${{ github.sha }} \
                        ./api

      - name: Push de l'image API
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/docker-learning-api:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/docker-learning-api:${{ github.sha }}

  # ============================================
  # JOB 3 : Déploiement sur AWS et Azure
  # ============================================
  deploy:
    name: Deploy to Cloud
    runs-on: ubuntu-latest
    needs: push-to-dockerhub
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      # --- Déploiement AWS ---
      - name: Préparer la clé SSH AWS
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_SSH_KEY }}" | base64 -d > ~/.ssh/aws_key
          chmod 600 ~/.ssh/aws_key

      - name: Déployer sur AWS
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/aws_key ubuntu@${{ secrets.AWS_HOST }} << 'EOF'
            # Créer le dossier du projet
            mkdir -p ~/app/secrets

            # Cloner ou mettre à jour le code
            if [ -d ~/app/.git ]; then
              cd ~/app && git pull origin main
            else
              git clone https://github.com/${{ github.repository }}.git ~/app
              cd ~/app
            fi

            # Créer les fichiers de secrets
            echo "${{ secrets.POSTGRES_USER }}" > ~/app/secrets/postgres_user
            echo "${{ secrets.POSTGRES_PASSWORD }}" > ~/app/secrets/postgres_password
            echo "${{ secrets.POSTGRES_DB }}" > ~/app/secrets/postgres_db

            # Pull les nouvelles images et redémarrer
            cd ~/app
            docker compose pull
            docker compose up -d --force-recreate
            echo "=== Déploiement AWS terminé ==="
            docker compose ps
          EOF

      # --- Déploiement Azure ---
      - name: Préparer la clé SSH Azure
        run: |
          echo "${{ secrets.AZURE_SSH_KEY }}" > ~/.ssh/azure_key
          chmod 600 ~/.ssh/azure_key

      - name: Déployer sur Azure
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/azure_key azureuser@${{ secrets.AZURE_HOST }} << 'EOF'
            # Créer le dossier du projet
            mkdir -p ~/app/secrets

            # Cloner ou mettre à jour le code
            if [ -d ~/app/.git ]; then
              cd ~/app && git pull origin main
            else
              git clone https://github.com/${{ github.repository }}.git ~/app
              cd ~/app
            fi

            # Créer les fichiers de secrets
            echo "${{ secrets.POSTGRES_USER }}" > ~/app/secrets/postgres_user
            echo "${{ secrets.POSTGRES_PASSWORD }}" > ~/app/secrets/postgres_password
            echo "${{ secrets.POSTGRES_DB }}" > ~/app/secrets/postgres_db

            # Pull les nouvelles images et redémarrer
            cd ~/app
            docker compose pull
            docker compose up -d --force-recreate
            echo "=== Déploiement Azure terminé ==="
            docker compose ps
          EOF
