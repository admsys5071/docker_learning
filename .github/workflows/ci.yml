# .github/workflows/ci.yml
name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Supprime le warning Node.js 20

jobs:
  build:
    name: Build & Test Docker Images
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code
      - name: Checkout du code
        uses: actions/checkout@v4

      # 2. Vérifier que Docker est disponible sur le runner
      - name: Vérifier Docker
        run: |
          docker --version
          docker compose version

      # 3. Builder les images avec docker compose
      - name: Build des images Docker
        run: docker compose build

      # 4. Démarrer les conteneurs
      - name: Démarrer les conteneurs
        run: docker compose up -d

      # 5. Attendre que les services soient prêts
      - name: Attendre le démarrage des services
        run: |
          echo "Attente de 15 secondes pour le démarrage..."
          sleep 15

      # 6. Vérifier que les services répondent
      - name: Tests de santé (Health Checks)
        run: |
          echo "=== Test API ==="
          curl -f http://localhost:8080 || exit 1
          echo ""
          echo "=== Test Grafana ==="
          curl -f http://localhost:3001/api/health || exit 1
          echo ""
          echo "=== Test Prometheus ==="
          curl -f http://localhost:9090/-/healthy || exit 1
          echo ""
          echo "Tous les services sont opérationnels !"

      # 7. Afficher les logs en cas de problème
      - name: Logs des conteneurs (debug)
        if: failure()
        run: docker compose logs

      # 8. Nettoyer
      - name: Arrêter les conteneurs
        if: always()
        run: docker compose down -v