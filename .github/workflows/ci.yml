name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build & Test Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Créer les fichiers de secrets
        run: |
          mkdir -p secrets
          echo "${{ secrets.POSTGRES_USER }}" > secrets/postgres_user
          echo "${{ secrets.POSTGRES_PASSWORD }}" > secrets/postgres_password
          echo "${{ secrets.POSTGRES_DB }}" > secrets/postgres_db

      - name: Vérifier Docker
        run: |
          docker --version
          docker compose version

      - name: Build des images Docker
        run: docker compose build

      - name: Démarrer les conteneurs
        run: docker compose up -d

      - name: Attendre le démarrage des services
        run: |
          echo "Attente de 15 secondes pour le démarrage..."
          sleep 15

      - name: Tests de santé (Health Checks)
        run: |
          echo "=== Test API ==="
          curl -f http://localhost:8080 || exit 1
          echo ""
          echo "=== Test Grafana ==="
          curl -f http://localhost:3001/api/health || exit 1
          echo ""
          echo "=== Test Prometheus ==="
          curl -f http://localhost:9090/-/healthy || exit 1
          echo ""
          echo "Tous les services sont opérationnels !"

      - name: Logs des conteneurs (debug)
        if: failure()
        run: docker compose logs

      - name: Arrêter les conteneurs
        if: always()
        run: docker compose down -v