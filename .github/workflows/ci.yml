name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ============================================
  # JOB 1 : Build, démarrage et tests
  # ============================================
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Créer les fichiers de secrets
        run: |
          mkdir -p secrets
          echo "${{ secrets.POSTGRES_USER }}" > secrets/postgres_user
          echo "${{ secrets.POSTGRES_PASSWORD }}" > secrets/postgres_password
          echo "${{ secrets.POSTGRES_DB }}" > secrets/postgres_db

      - name: Build des images Docker
        run: docker compose build

      - name: Démarrer les conteneurs
        run: docker compose up -d

      - name: Attendre le démarrage des services
        run: sleep 15

      - name: Tests de santé
        run: |
          echo "=== Test API ==="
          curl -f http://localhost:8080 || exit 1
          echo ""
          echo "=== Test Grafana ==="
          curl -f http://localhost:3001/api/health || exit 1
          echo ""
          echo "=== Test Prometheus ==="
          curl -f http://localhost:9090/-/healthy || exit 1
          echo ""
          echo "Tous les services sont opérationnels !"

      - name: Logs des conteneurs (debug)
        if: failure()
        run: docker compose logs

      - name: Arrêter les conteneurs
        if: always()
        run: docker compose down -v

  # ============================================
  # JOB 2 : Push vers Docker Hub
  # ============================================
  push-to-dockerhub:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build et tag de l'image API
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/docker-learning-api:latest \
                        -t ${{ secrets.DOCKERHUB_USERNAME }}/docker-learning-api:${{ github.sha }} \
                        ./api

      - name: Push de l'image API
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/docker-learning-api:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/docker-learning-api:${{ github.sha }}
